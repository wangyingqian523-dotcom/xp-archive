<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XP Archive | 全平台创作工作站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --accent-color: #6366f1;
            --fav-pink-bg: linear-gradient(135deg, #fff1f2 0%, #ffe4e6 100%);
            --fav-pink-border: #fb7185;
            --fav-pink-text: #be123c;
        }

        body {
            background-color: var(--bg-color);
            color: #1e293b;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (min-width: 1024px) {
            .app-container {
                grid-template-columns: 1fr 320px; /* PC端主体+右侧序列 */
                padding: 0 24px;
            }
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        #mainGrid {
            column-count: 2;
            column-gap: 24px;
        }

        @media (min-width: 1440px) { #mainGrid { column-count: 3; } }
        @media (max-width: 768px) { #mainGrid { column-count: 1; } }

        .xp-card {
            break-inside: avoid;
            margin-bottom: 24px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0,0,0,0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .xp-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
        }

        /* --- 优化后的侧边抽屉目录 --- */
        .toc-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: white;
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 20px 0 50px rgba(0,0,0,0.05);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .toc-sidebar.open {
            transform: translateX(0);
        }

        .toc-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.2);
            backdrop-filter: blur(4px);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .toc-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .toc-nav {
            flex: 1;
            overflow-y: auto;
            margin-top: 20px;
        }

        .toc-title {
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 12px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toc-link {
            font-size: 14px;
            padding: 10px 16px;
            color: #64748b;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
            display: block;
            margin-bottom: 4px;
            border: 1px solid transparent;
        }

        .toc-link:hover {
            background: #f8fafc;
            color: var(--accent-color);
        }

        .toc-link.active {
            background: #eef2ff;
            color: var(--accent-color);
            border-color: #e0e7ff;
            font-weight: 600;
        }

        /* 目录浮动按钮 */
        .toc-trigger {
            position: fixed;
            left: 24px;
            bottom: 32px;
            z-index: 80;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: white;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .toc-trigger:hover {
            transform: scale(1.1);
            color: var(--accent-color);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.2);
        }

        /* --- 原始样式保持 --- */
        .tag-pill {
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #e2e8f0;
            background: #fff;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 13px;
            color: #475569;
            outline: none;
        }

        .tag-pill:hover { border-color: var(--accent-color); background: #f8fafc; }
        .tag-pill:active { transform: scale(0.95); }

        .tag-pill.favorite {
            background: var(--fav-pink-bg);
            border-color: var(--fav-pink-border);
            color: var(--fav-pink-text);
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(251, 113, 133, 0.1);
        }

        .fav-heart { color: #e11d48; font-size: 10px; display: none; }
        .tag-pill.favorite .fav-heart { display: inline-block; }

        .sequence-wrapper {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 1023px) {
            .sequence-wrapper {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: #1e293b;
                color: white;
                border-radius: 24px 24px 0 0;
                z-index: 100;
                transform: translateY(calc(100% - 64px));
                box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
            }
            .sequence-wrapper.open { transform: translateY(0); }
            .toc-trigger { left: 16px; bottom: 80px; } /* 移动端避开序列栏 */
        }

        @media (min-width: 1024px) {
            .sequence-wrapper {
                position: sticky;
                top: 100px;
                height: calc(100vh - 140px);
                background: white;
                border-radius: 24px;
                border: 1px solid rgba(0,0,0,0.05);
                padding: 24px;
                display: flex;
                flex-direction: column;
            }
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .edit-mode .editable-focus {
            background: #f8fafc;
            border: 1px dashed var(--accent-color);
            border-radius: 4px;
            padding: 2px 4px;
        }
        
        .edit-mode .xp-card { border: 2px dashed #e2e8f0; }

        .delete-btn-tag {
            opacity: 0.4;
            transition: all 0.2s;
        }
        .delete-btn-tag:hover {
            opacity: 1;
            color: #ef4444;
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <header class="glass-header px-4 py-4 mb-6">
        <div class="max-w-[1600px] mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                    <i class="fas fa-brain"></i>
                </div>
                <div class="hidden sm:block">
                    <h1 class="font-bold text-lg text-slate-800 leading-tight">XP Archive</h1>
                    <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Creative Station</p>
                </div>
            </div>

            <div class="flex-1 max-w-xl mx-4">
                <div class="relative group">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="text" id="searchInput" placeholder="搜索关键词..." 
                        class="w-full pl-11 pr-4 py-2.5 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none text-sm transition-all">
                </div>
            </div>

            <div class="flex items-center gap-2">
                <button onclick="toggleEditMode()" id="editModeBtn" title="管理模式" class="w-10 h-10 rounded-xl bg-white border border-slate-200 text-slate-600 flex items-center justify-center hover:bg-slate-50 transition-all shadow-sm">
                    <i class="fas fa-cog"></i>
                </button>
                
                <div class="relative group">
                    <button class="w-10 h-10 rounded-xl bg-white border border-slate-200 text-slate-600 flex items-center justify-center shadow-sm">
                        <i class="fas fa-layer-group"></i>
                    </button>
                    <div class="absolute right-0 mt-2 w-48 bg-white rounded-2xl shadow-xl border border-slate-100 hidden group-focus-within:block z-50 overflow-hidden">
                        <button onclick="exportJSON()" class="w-full text-left px-4 py-3 hover:bg-slate-50 text-sm flex items-center gap-3"><i class="fas fa-download text-blue-500"></i>导出备份</button>
                        <button onclick="document.getElementById('importInput').click()" class="w-full text-left px-4 py-3 hover:bg-slate-50 text-sm flex items-center gap-3"><i class="fas fa-upload text-green-500"></i>导入数据</button>
                        <button onclick="resetData()" class="w-full text-left px-4 py-3 hover:bg-red-50 text-sm text-red-500 flex items-center gap-3 border-t"><i class="fas fa-trash-alt"></i>重置系统</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 目录遮罩层 -->
    <div id="tocOverlay" class="toc-overlay" onclick="toggleToc(false)"></div>
    
    <!-- 侧边目录 -->
    <aside id="tocSidebar" class="toc-sidebar">
        <div class="flex items-center justify-between mb-2">
            <div class="toc-title"><i class="fas fa-list-ul text-indigo-500"></i> 快速导航</div>
            <div class="toc-nav" id="tocNav">
            </div>
            <div class="toc-overlay"></div><div class="toc-trigger" onclick="toggleToc()">
☰
</div>
            <button onclick="toggleToc(false)" class="text-slate-400 hover:text-slate-600">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <nav id="toc" class="toc-nav custom-scroll">
            <!-- JS Rendered -->
        </nav>
        <div class="mt-auto pt-4 border-t border-slate-100">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest text-center">XP Archive v3.5</p>
        </div>
    </aside>

    <!-- 目录开关按钮 -->
    <button class="toc-trigger" onclick="toggleToc(true)" title="展开目录">
        <i class="fas fa-indent"></i>
    </button>

    <main class="app-container pb-24 lg:pb-12 px-4">
        <!-- Main Content -->
        <section>
            <div id="addCategoryContainer" class="hidden mb-6">
                <button onclick="addNewCategory()" class="w-full py-4 border-2 border-dashed border-indigo-200 rounded-2xl text-indigo-500 bg-indigo-50/30 flex items-center justify-center gap-2 font-bold hover:bg-indigo-50 transition-all">
                    <i class="fas fa-plus-circle"></i> 创建新的一级分类
                </button>
            </div>

            <div id="mainGrid">
                <!-- JS Rendered -->
            </div>
        </section>

        <!-- Right Bar: Inspiration Sequence -->
        <aside id="sequenceBar" class="sequence-wrapper">
            <div class="mobile-handle lg:hidden flex justify-center py-3" onclick="toggleDrawer()">
                <div class="w-12 h-1.5 bg-slate-600 rounded-full"></div>
            </div>

            <div class="h-full flex flex-col p-4 lg:p-0">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-indigo-600 text-white rounded-lg flex items-center justify-center text-xs font-bold shadow-md" id="sequenceCount">00</div>
                        <h2 class="font-bold text-slate-800 lg:text-slate-800 text-white">灵感序列</h2>
                    </div>
                    <div class="flex gap-2">
                        <div class="flex items-center gap-1">
                            <input id="randomCount" type="number" min="1" max="20" value="3" class="w-10 text-xs text-center rounded bg-slate-100 border-none lg:bg-slate-100 bg-slate-700 py-1">
                            <button onclick="doRandomFromInput()" class="w-8 h-8 rounded-lg bg-slate-100 lg:bg-slate-100 bg-slate-700 text-slate-400 hover:text-indigo-500 flex items-center justify-center">
                                <i class="fas fa-dice"></i>
                            </button>
                        </div>
                        <button onclick="clearSequence()" class="w-8 h-8 rounded-lg bg-slate-100 lg:bg-slate-100 bg-slate-700 text-slate-400 hover:text-red-500 flex items-center justify-center">
                            <i class="fas fa-eraser"></i>
                        </button>
                    </div>
                </div>

                <div id="sequenceContainer" class="flex lg:flex-wrap gap-2 overflow-x-auto lg:overflow-y-auto custom-scroll pb-4 lg:pb-0 flex-1 min-h-[60px] content-start">
                    <!-- JS Rendered -->
                </div>

                <div class="mt-6 pt-4 border-t border-slate-100">
                    <button onclick="exportSequence(event)" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-copy"></i> 复制完整 Prompt
                    </button>
                </div>
            </div>
        </aside>
    </main>

    <input type="file" id="importInput" class="hidden" accept=".json" onchange="importJSON(event)">

    <script>
        const GIST_ID = "4c6ea80edb304829d5ace8a7b7cc2f75";
        const GITHUB_TOKEN = "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";
        const FILE_NAME = "xp_archive_data.json";

        async function loadCloudData() {

            const res = await fetch(
                `https://api.github.com/gists/${GIST_ID}`
            );

            const data = await res.json();
            const file = data.files[FILE_NAME];
    
            if(!file){
                state.db = defaultData;
                state.favorites = [];
                render();
                return;
            }

            const parsed = JSON.parse(file.content);

            state.db = parsed.db || defaultData;
            state.favorites = parsed.favorites || [];
            render();
        }


        async function saveCloudData() {

            const body = {
                files: {
                    [FILE_NAME]: {
                        content: JSON.stringify({
                            db: state.db,
                            favorites: state.favorites
                        }, null, 2)
                    }
                }
            };

            await fetch(
                `https://api.github.com/gists/${GIST_ID}`,
                {
                    method: "PATCH",
                    headers: {
                        Authorization: `token ${GITHUB_TOKEN}`
                    },
                    body: JSON.stringify(body)
                }
            );
        }

        let state = {
            db: {},
            favorites: [],
            sequence: [],
            isEditMode: false,
            isDrawerOpen: false,
            isTocOpen: false
        };

        const STORAGE_KEY = `xp_pro_v3_data_${typeof __app_id !== 'undefined' ? __app_id : 'default'}`;

        const defaultData = {
            "核心角色": {
                "身份地位": ["禁欲系医生", "落魄贵族", "赛博黑客", "深渊领主", "退役雇佣兵", "人工智能本体"],
                "性格特质": ["极端理智", "病态依恋", "伪善温柔", "野性难驯", "社交恐惧", "极度自律"]
            },
            "叙事冲突": {
                "情感困境": ["契约婚姻", "记忆篡改", "感官共有", "身份对立", "跨维度思念"],
                "环境压力": ["末日废土", "高维监视", "无限流副本", "信息素紊乱", "能源枯竭"]
            },
            "视觉风格": {
                "色调氛围": ["克苏鲁深蓝", "蒸汽朋克古铜", "废土霓虹", "高调纯白", "莫兰迪灰"],
                "质感表现": ["金属拉丝", "半透明蝉翼", "湿漉皮革", "流体黄金", "全息投影"]
            },
            "XP偏好": {
                "触觉感官": ["微冷指尖", "粗糙指腹", "紧致颈项", "轻微战栗"],
                "特殊萌点": ["反差萌", "眼镜控", "制服诱惑", "白手套"]
            }
        };

       
        window.onload = async () => {

            await loadCloudData();

            setupSearch();

            document.addEventListener('contextmenu', e => {
                const tagEl = e.target.closest('.tag-pill');
                if (tagEl && !state.isEditMode) {
                    e.preventDefault();
                    toggleFavorite(tagEl.dataset.tagId);
                }
            });

            window.addEventListener('scroll', throttle(updateActiveToc, 100));

        };

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            const parsed = saved ? JSON.parse(saved) : null;
            state.db = parsed ? parsed.db : defaultData;
            state.favorites = parsed ? (parsed.favorites || []) : [];
        }

        function saveData() {

            localStorage.setItem(
                STORAGE_KEY,
                JSON.stringify({
                    db: state.db,
                    favorites: state.favorites
                })
            );

            saveCloudData();
        }

        function render(filter = '') {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';

            Object.entries(state.db).forEach(([catTitle, subCats]) => {
                const hasMatchingTags = Object.values(subCats).some(tags => 
                    tags.some(t => t.toLowerCase().includes(filter.toLowerCase()))
                );
                const hasMatchingSub = Object.keys(subCats).some(s => s.toLowerCase().includes(filter.toLowerCase()));
                
                if (filter && !catTitle.toLowerCase().includes(filter.toLowerCase()) && !hasMatchingTags && !hasMatchingSub) return;

                const catEl = document.createElement('div');
                catEl.className = 'xp-card p-6';
                catEl.id = `section-${catTitle.replace(/\s+/g, '-')}`;
                catEl.dataset.id = catTitle;

                let headerHTML = `
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-3">
                            <div class="w-1.5 h-6 bg-indigo-500 rounded-full"></div>
                            <h2 class="font-extrabold text-lg text-slate-800 ${state.isEditMode ? 'editable-focus' : ''}" 
                                contenteditable="${state.isEditMode}" 
                                onblur="handleInlineEdit(this, 'cat', '${catTitle}')"
                                onkeydown="handleEnter(event)">${catTitle}</h2>
                        </div>
                        ${state.isEditMode ? `
                            <div class="flex gap-1">
                                <button onclick="deleteItem('cat', '${catTitle}', null, null, event)" class="w-8 h-8 rounded-lg hover:bg-red-50 text-red-400 flex items-center justify-center">
                                    <i class="fas fa-trash-alt text-xs"></i>
                                </button>
                                <div class="handle w-8 h-8 rounded-lg flex items-center justify-center text-slate-300 cursor-move">
                                    <i class="fas fa-grip-vertical text-xs"></i>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;

                let subHTML = `<div class="space-y-6">`;
                Object.entries(subCats).forEach(([subTitle, tags]) => {
                    const filteredTags = tags.filter(t => t.toLowerCase().includes(filter.toLowerCase()));
                    if (filter && filteredTags.length === 0 && !subTitle.toLowerCase().includes(filter.toLowerCase())) return;

                    const sortedTags = [...filteredTags].sort((a, b) => {
                        const aFav = state.favorites.includes(a) ? 1 : 0;
                        const bFav = state.favorites.includes(b) ? 1 : 0;
                        return bFav - aFav;
                    });

                    subHTML += `
                        <div class="sub-card" data-sub-id="${subTitle}">
                            <div class="flex justify-between items-center mb-3">
                                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 ${state.isEditMode ? 'editable-focus' : ''}"
                                    contenteditable="${state.isEditMode}"
                                    onblur="handleInlineEdit(this, 'sub', '${catTitle}', '${subTitle}')"
                                    onkeydown="handleEnter(event)">${subTitle}</h3>
                                ${state.isEditMode ? `
                                    <button onclick="deleteItem('sub', '${catTitle}', '${subTitle}', null, event)" class="text-slate-300 hover:text-red-500">
                                        <i class="fas fa-times text-[10px]"></i>
                                    </button>
                                ` : ''}
                            </div>
                            <div class="flex flex-wrap gap-2">
                                ${sortedTags.map(tag => {
                                    const isFav = state.favorites.includes(tag);
                                    return `
                                        <div class="tag-pill ${isFav ? 'favorite' : ''}" 
                                             data-tag-id="${tag}"
                                             onclick="handleTagClick('${tag}', event)">
                                            <i class="fas fa-heart fav-heart"></i>
                                            <span contenteditable="${state.isEditMode}" 
                                                  onblur="handleInlineEdit(this, 'tag', '${catTitle}', '${subTitle}', '${tag}')"
                                                  onkeydown="handleEnter(event)"
                                                  class="outline-none">${tag}</span>
                                            ${state.isEditMode ? `
                                                <i class="fas fa-times-circle delete-btn-tag text-[10px] ml-1" 
                                                   onclick="deleteItem('tag', '${catTitle}', '${subTitle}', '${tag}', event)"></i>
                                            ` : ''}
                                        </div>
                                    `;
                                }).join('')}
                                ${state.isEditMode ? `
                                    <button onclick="addNewTag('${catTitle}', '${subTitle}')" class="tag-pill border-dashed border-indigo-200 text-indigo-500 bg-indigo-50/50">+ 添加</button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });

                if (state.isEditMode) {
                    subHTML += `<button onclick="addNewSubCategory('${catTitle}')" class="w-full py-2.5 border border-dashed border-slate-200 rounded-xl text-slate-400 text-[10px] font-bold uppercase tracking-widest hover:border-indigo-300 hover:text-indigo-500 transition-all">+ 新增子分类</button>`;
                }

                catEl.innerHTML = headerHTML + subHTML + `</div>`;
                grid.appendChild(catEl);
            });

            if (state.isEditMode) initSortable();
            renderTOC();
            updateSequenceUI();
        }

        // 切换目录显示
        function toggleToc() {

            const sidebar = document.querySelector(".toc-sidebar");
            const overlay = document.querySelector(".toc-overlay");
        
            const isOpen = sidebar.classList.contains("open");
        
            if (isOpen) {
        
                sidebar.classList.remove("open");
                overlay.classList.remove("active");
                state.isTocOpen = false;
        
            } else {
        
                sidebar.classList.add("open");
                overlay.classList.add("active");
                state.isTocOpen = true;
        
            }
        
        }

        document.addEventListener("click", function(e){

            if(e.target.classList.contains("toc-overlay")){
                toggleToc();
            }
        
        });
        function renderTOC() {
            const toc = document.getElementById("toc");
            if (!toc) return;
            toc.innerHTML = '';

            Object.keys(state.db).forEach(cat => {
                const link = document.createElement("div");
                link.className = "toc-link";
                link.innerText = cat;
                link.onclick = () => {
                    scrollToSection(cat);
                    if (window.innerWidth < 1024) toggleToc(false); // 移动端点击后自动关闭
                    else setTimeout(() => toggleToc(false), 400); // PC端也自动收起，让出视野
                };
                toc.appendChild(link);
            });
        }

        function scrollToSection(cat) {
            const id = `section-${cat.replace(/\s+/g, '-')}`;
            const el = document.getElementById(id);
            if (el) {
                const headerOffset = 100;
                const elementPosition = el.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                window.scrollTo({ top: offsetPosition, behavior: "smooth" });
            }
        }

        function updateActiveToc() {
            const sections = document.querySelectorAll('.xp-card');
            const links = document.querySelectorAll('.toc-link');
            let current = "";

            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                if (pageYOffset >= sectionTop - 150) {
                    current = section.dataset.id;
                }
            });

            links.forEach(link => {
                link.classList.remove('active');
                if (link.innerText === current) {
                    link.classList.add('active');
                }
            });
        }

        function toggleFavorite(tagId) {
            const index = state.favorites.indexOf(tagId);
            if (index === -1) state.favorites.push(tagId);
            else state.favorites.splice(index, 1);
            saveData();
            render();
        }

        function handleTagClick(tag, event) {
            if (state.isEditMode) return;
            state.sequence.push(tag);
            updateSequenceUI();
            if (window.innerWidth < 1024 && state.sequence.length === 1 && !state.isDrawerOpen) toggleDrawer();
        }

        function handleInlineEdit(el, type, cat, sub, tag) {
            const newVal = el.innerText.trim();
            if (!newVal) { render(); return; }

            if (type === 'cat') {
                if (newVal === cat) return;
                state.db[newVal] = state.db[cat];
                delete state.db[cat];
            } else if (type === 'sub') {
                if (newVal === sub) return;
                state.db[cat][newVal] = state.db[cat][sub];
                delete state.db[cat][sub];
            } else if (type === 'tag') {
                if (newVal === tag) return;
                const idx = state.db[cat][sub].indexOf(tag);
                if (idx !== -1) {
                    state.db[cat][sub][idx] = newVal;
                    const favIdx = state.favorites.indexOf(tag);
                    if (favIdx !== -1) state.favorites[favIdx] = newVal;
                }
            }
            saveData();
            if (type !== 'tag') render();
        }

        function handleEnter(e) { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } }

        function toggleEditMode() {
            state.isEditMode = !state.isEditMode;
            const btn = document.getElementById('editModeBtn');
            btn.classList.toggle('bg-indigo-600');
            btn.classList.toggle('text-white');
            document.getElementById('addCategoryContainer').classList.toggle('hidden');
            render();
        }

        function updateSequenceUI() {
            const container = document.getElementById('sequenceContainer');
            document.getElementById('sequenceCount').innerText = state.sequence.length.toString().padStart(2, '0');
            
            if (state.sequence.length === 0) {
                container.innerHTML = `<div class="text-slate-400 text-xs italic py-4">点击标签捕获灵感...</div>`;
                return;
            }

            container.innerHTML = state.sequence.map((tag, idx) => `
                <div class="flex-shrink-0 flex items-center gap-2 bg-indigo-600 lg:bg-indigo-50 text-white lg:text-indigo-600 px-3 py-1.5 rounded-xl text-sm font-semibold shadow-sm border border-transparent lg:border-indigo-100">
                    <span>${tag}</span>
                    <i onclick="removeFromSequence(${idx})" class="fas fa-times text-[10px] opacity-70 hover:opacity-100 cursor-pointer"></i>
                </div>
            `).join('');
            
            container.scrollTo({ left: container.scrollWidth, behavior: 'smooth' });
        }

        function removeFromSequence(idx) { state.sequence.splice(idx, 1); updateSequenceUI(); }
        function clearSequence() { state.sequence = []; updateSequenceUI(); }
        function toggleDrawer() {
            const bar = document.getElementById('sequenceBar');
            state.isDrawerOpen = !state.isDrawerOpen;
            bar.classList.toggle('open', state.isDrawerOpen);
        }

        function addNewCategory() {
            const name = "新分类 " + (Object.keys(state.db).length + 1);
            state.db[name] = {};
            saveData(); render();
        }

        function addNewSubCategory(cat) {
            const name = "属性 " + (Object.keys(state.db[cat]).length + 1);
            state.db[cat][name] = [];
            saveData(); render();
        }

        function addNewTag(cat, sub) {
            const name = "新建标签";
            state.db[cat][sub].push(name);
            saveData(); render();
        }

        function deleteItem(type, cat, sub, tag, e) {
            if (e) e.stopPropagation();
            if (type !== 'tag' && !confirm('确认删除此内容？')) return;
            
            if (type === 'cat') delete state.db[cat];
            else if (type === 'sub') delete state.db[cat][sub];
            else {
                state.db[cat][sub] = state.db[cat][sub].filter(t => t !== tag);
                state.favorites = state.favorites.filter(f => f !== tag);
            }
            saveData(); render();
        }

        function setupSearch() {
            const input = document.getElementById('searchInput');
            input.addEventListener('input', (e) => render(e.target.value));
        }

        function initSortable() {
            new Sortable(document.getElementById('mainGrid'), { 
                handle: '.handle', 
                animation: 200, 
                ghostClass: 'opacity-50',
                onEnd: () => {
                    const newDb = {};
                    document.querySelectorAll('#mainGrid > div').forEach(el => {
                        const id = el.dataset.id;
                        if (id && state.db[id]) newDb[id] = state.db[id];
                    });
                    state.db = newDb;
                    saveData();
                    renderTOC();
                }
            });
        }

        function doRandomFromInput() {
            const input = document.getElementById("randomCount");
            let count = parseInt(input.value) || 3;
            const allTags = [];
            Object.values(state.db).forEach(subs => Object.values(subs).forEach(tags => allTags.push(...tags)));
            if (allTags.length === 0) return;
            
            state.sequence = [];
            for(let i=0; i<count; i++) {
                state.sequence.push(allTags[Math.floor(Math.random() * allTags.length)]);
            }
            updateSequenceUI();
            if (window.innerWidth < 1024 && !state.isDrawerOpen) toggleDrawer();
        }

        async function exportSequence(e) {
            if (state.sequence.length === 0) return;
            const text = state.sequence.join(', ');
            try {
                await navigator.clipboard.writeText(text);
                const btn = e.currentTarget;
                const original = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> 已复制到剪贴板';
                btn.classList.replace('bg-indigo-600', 'bg-green-600');
                setTimeout(() => {
                    btn.innerHTML = original;
                    btn.classList.replace('bg-green-600', 'bg-indigo-600');
                }, 2000);
            } catch (err) {
                console.error("Copy failed");
            }
        }

        function exportJSON() {
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `XP_Archive_Export_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function importJSON(e) {
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if(imported.db) {
                        state.db = imported.db;
                        state.favorites = imported.favorites || [];
                        saveData(); render();
                    }
                } catch(err) { alert("文件格式错误"); }
            };
            reader.readAsText(e.target.files[0]);
        }

        function resetData() {
            if (confirm('警告：将清空所有自定义标签并还原至默认设置，确定吗？')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        function throttle(func, limit) {
            let inThrottle;
            return function() {
                const args = arguments;
                const context = this;
                if (!inThrottle) {
                    func.apply(context, args);
                    inThrottle = true;
                    setTimeout(() => inThrottle = false, limit);
                }
            }
        }
    </script>
</body>
</html>
